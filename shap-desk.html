<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHAP-based explainability — BigQuant · Yujia Huang</title>
  <style>
    :root {
      --bg: #05070c;
      --text: #f2f2f2;
      --muted: #9aa3b2;
      --accent: #f0d35a;
      --panel: rgba(12, 16, 24, 0.72);
      --line: rgba(255, 255, 255, 0.14);
      --link: #8eb6ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", Times, serif;
    }
    body {
      background:
        radial-gradient(ellipse at 50% 40%, #141a28 0%, #05070c 62%),
        #05070c;
      overflow: hidden;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 100vh;
    }

    .back {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 5;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
    }
    .back:hover { text-decoration: underline; }

    .theme {
      position: absolute;
      top: 0.85rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      width: min(92vw, 40rem);
      margin: 0;
      text-align: center;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
    }
    .theme strong {
      color: #d5dbe6;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .question {
      position: absolute;
      top: 2.35rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      width: min(92vw, 46rem);
      text-align: center;
      font-size: clamp(1.05rem, 2.6vw, 1.5rem);
      font-weight: 600;
      line-height: 1.4;
      margin: 0;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.65);
    }
    .question select {
      font: inherit;
      font-weight: 600;
      color: var(--accent);
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(240, 211, 90, 0.45);
      border-radius: 4px;
      padding: 0.12rem 0.4rem;
      cursor: pointer;
      max-width: min(70vw, 18rem);
    }

    .jump {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: flex-end;
    }
    .jump label {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .jump select {
      font: inherit;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0.35rem 0.5rem;
      min-width: 11rem;
      cursor: pointer;
    }

    .search {
      position: absolute;
      top: 5.6rem;
      left: 1rem;
      z-index: 5;
      width: min(16rem, 42vw);
    }
    .search input {
      width: 100%;
      font: inherit;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0.45rem 0.6rem;
    }
    .search input::placeholder { color: #7a8494; }

    .stage {
      position: absolute;
      inset: 6.4rem 1rem 8.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .stage canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      border-radius: 4px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      background: #0b1018;
      cursor: crosshair;
    }
    .stage .status {
      position: absolute;
      font-size: 0.9rem;
      color: var(--muted);
      pointer-events: none;
    }
    .stage .tip {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      display: none;
      max-width: 16rem;
      padding: 0.4rem 0.55rem;
      font-size: 0.78rem;
      line-height: 1.35;
      color: var(--text);
      background: rgba(8, 12, 20, 0.92);
      border: 1px solid var(--line);
      border-radius: 3px;
    }
    .context {
      position: absolute;
      left: 1rem;
      bottom: 1.1rem;
      z-index: 5;
      width: min(26rem, 88vw);
      pointer-events: none;
    }
    .context p {
      margin: 0 0 0.45rem;
      font-size: 0.9rem;
      line-height: 1.45;
      color: #d5dbe6;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7);
    }
    .context h2 {
      margin: 0;
      font-size: clamp(1.4rem, 3.2vw, 2.1rem);
      font-weight: 700;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.75);
    }

    .factor-panel {
      position: absolute;
      right: 1rem;
      bottom: 1.1rem;
      z-index: 5;
      width: min(17.5rem, 90vw);
      max-height: min(42vh, 22rem);
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0.65rem 0.7rem;
      backdrop-filter: blur(6px);
    }
    .factor-panel h3 {
      margin: 0 0 0.35rem;
      font-size: 0.95rem;
      word-break: break-word;
    }
    .factor-panel .meta {
      margin: 0 0 0.45rem;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .factor-panel .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.35rem;
      margin-bottom: 0.45rem;
    }
    .factor-panel .stats div {
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 0.35rem 0.4rem;
      background: rgba(255, 255, 255, 0.03);
    }
    .factor-panel .k { font-size: 0.68rem; color: var(--muted); }
    .factor-panel .v { font-size: 0.95rem; font-variant-numeric: tabular-nums; }
    .factor-panel ol {
      margin: 0; padding-left: 1.05rem; font-size: 0.8rem;
    }
    .factor-panel li { margin: 0.2rem 0; }
    .factor-panel button {
      font: inherit; font-size: inherit; color: var(--link);
      background: none; border: 0; padding: 0; cursor: pointer; text-decoration: underline;
    }

    .factor-panel .panel-kicker {
      margin: 0 0 0.3rem;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .keys {
      position: absolute;
      bottom: 1.15rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      pointer-events: none;
      max-width: min(36rem, 70vw);
      line-height: 1.35;
    }

    @media (max-width: 720px) {
      .theme { top: 2.75rem; }
      .question { top: 4.2rem; font-size: 1rem; }
      .jump { top: 1rem; }
      .search { top: 7.4rem; }
      .stage { inset: 9.8rem 0.6rem 12rem; }
      .factor-panel { max-height: 28vh; }
      .keys { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <a class="back" href="index.html">← Back</a>

    <p class="theme"><strong>SHAP-based explainability</strong></p>

    <p class="question">
      Which
      <select id="view-select" aria-label="Choose figure"></select>
      best opens how the model weighed each factor?
    </p>

    <div class="jump">
      <label for="jump-select">Jump to…</label>
      <select id="jump-select" aria-label="Jump to view"></select>
    </div>

    <div class="search">
      <input id="factor-search" type="search" placeholder="Inspect a factor, e.g. pe_ttm" autocomplete="off">
    </div>

    <div class="stage" id="stage">
      <canvas id="viz-canvas" width="960" height="560" hidden></canvas>
      <div class="status" id="viz-status" hidden>Loading figure…</div>
      <div class="tip" id="viz-tip"></div>
    </div>

    <div class="context">
      <p id="view-blurb"></p>
      <h2 id="view-title"></h2>
    </div>

    <aside class="factor-panel" id="factor-panel">
      <p class="panel-kicker">Factor under SHAP</p>
      <h3 id="ins-name">—</h3>
      <p class="meta" id="ins-plain"></p>
      <div class="stats">
        <div><div class="k">Gain</div><div class="v" id="ins-gain">—</div></div>
        <div><div class="k">Mean |SHAP|</div><div class="v" id="ins-shap">—</div></div>
      </div>
      <div class="k" style="margin-bottom:0.25rem">Strongest interactions</div>
      <ol id="ins-partners"></ol>
    </aside>

    <p class="keys">← → switch views · hover a factor</p>
  </div>

  <script src="js/bigquant-data.js"></script>
  <script src="js/shap-desk.js"></script>
</body>
</html>
